[client]
# Hide the auto-generated multipage list; navigation is provided in-app (see utils/app_navigation.py).
showSidebarNavigation = false
# Top-right ⋮ menu: not app settings — Streamlit runtime (rerun, clear cache, etc.). "viewer" hides
# developer-only items for a cleaner UI. Use "auto" or "developer" locally if you want them back.
toolbarMode = "viewer"

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
# Increase session timeout and enable session persistence
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

